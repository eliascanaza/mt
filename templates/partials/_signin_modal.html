<div class="si-overlay" id="si-overlay" {% if not si_close_action %} onclick="if(event.target===this)closeSignIn()" {%
  endif %}>
  <div class="si-modal">
    <button class="si-close" onclick="{{ si_close_action|default('closeSignIn()') }}"
      aria-label="Close">&times;</button>
    <div class="logo-mark"
      style="background:var(--red);width:44px;height:44px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
      <svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:#fff">
        <path fill-rule="evenodd"
          d="M12 2L22 21H2ZM12 5L20 21H4ZM4 21L9 12L11 21ZM13 21L15 12L20 21Z" />
      </svg>
    </div>
    <div class="si-title">{{ si_title|default("Welcome to exploreMore") }}</div>
    <p class="si-sub">{{ si_sub|default("Sign in with Google to save your plans, track trip history, and pick up where
      you left off.") }}</p>
    <div class="si-gbtn" id="g_id_signin_container"></div>
    <div class="si-fallback" id="si-fallback" style="display:none">
      Google sign-in isn't available right now. Please try again later.
    </div>
  </div>
</div>
